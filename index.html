<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<title>Pokémon — Type Guide</title>
<meta name="description" content="Pokémon type weakness and resistance guide — search all 1025 Pokémon, plus team builder with move coverage">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dex">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { height: 100%; }

body {
  background: #0a0e1a;
  color: #e8eaf6;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  min-height: 100%;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: none;
}

.tab-btn, .slot-num, .type-badge, .chip, .ac-item {
  -webkit-user-select: none;
  user-select: none;
}

.container {
  max-width: 680px;
  margin: 0 auto;
  padding: 0 16px 40px;
}

/* HEADER */
header {
  text-align: center;
  padding: 40px 16px 28px;
}

.header-icon {
  font-size: 40px;
  margin-bottom: 12px;
  display: block;
}
.header-icon img {
  width: 52px;
  height: 52px;
  object-fit: contain;
  filter: drop-shadow(0 0 12px rgba(245,197,24,0.35));
}

header h1 {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: #f5c518;
  text-shadow: 0 0 30px rgba(245,197,24,0.4);
  margin-bottom: 6px;
  line-height: 1.3;
}

header h1 span {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: #7986a8;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 4px;
}

/* SEARCH */
.search-wrap {
  position: relative;
  margin: 0 auto 12px;
}

.search-icon-el {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 17px;
  pointer-events: none;
  opacity: 0.5;
}

#search {
  width: 100%;
  padding: 15px 48px 15px 46px;
  background: #111827;
  border: 2px solid #2a3550;
  border-radius: 14px;
  color: #e8eaf6;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 17px;
  font-weight: 500;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
  transition: border-color 0.2s;
}

#search:focus {
  border-color: #f5c518;
}

#search::placeholder {
  color: #4a5568;
  font-weight: 400;
}

.clear-btn {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: #2a3550;
  border: none;
  border-radius: 50%;
  width: 28px;
  height: 28px;
  color: #7986a8;
  font-size: 13px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  transition: background 0.15s, color 0.15s;
}
.clear-btn:active { background: #e84393; color: #fff; }
.clear-btn.visible { display: flex; }

/* AUTOCOMPLETE */
.autocomplete-list {
  position: absolute;
  top: calc(100% + 6px);
  left: 0; right: 0;
  background: #111827;
  border: 2px solid #2a3550;
  border-radius: 14px;
  max-height: 280px;
  overflow-y: auto;
  z-index: 100;
  display: none;
  -webkit-overflow-scrolling: touch;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.autocomplete-list.show { display: block; }

.ac-item {
  padding: 12px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 15px;
  font-weight: 500;
  border-bottom: 1px solid #1a2235;
  -webkit-user-select: none;
  user-select: none;
}
.ac-item:last-child { border-bottom: none; }
.ac-item:active, .ac-item.selected { background: #1a2235; }

.ac-num { color: #4a5568; font-size: 12px; min-width: 44px; font-variant-numeric: tabular-nums; }
.ac-types { margin-left: auto; display: flex; gap: 5px; flex-shrink: 0; }

/* RESULT AREA */
#result { margin-top: 8px; }

.hint {
  text-align: center;
  color: #4a5568;
  font-size: 14px;
  margin-top: 48px;
  line-height: 1.6;
}

/* CARD */
.card {
  background: #111827;
  border: 1px solid #2a3550;
  border-radius: 18px;
  overflow: hidden;
  animation: fadeUp 0.25s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-header {
  padding: 20px;
  border-bottom: 1px solid #1a2235;
  display: flex;
  align-items: center;
  gap: 16px;
  background: linear-gradient(135deg, #1a2235 0%, #111827 100%);
}

.poke-sprite {
  width: 88px;
  height: 88px;
  object-fit: contain;
  flex-shrink: 0;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
}

.poke-info { flex: 1; min-width: 0; }

.dex-num {
  font-size: 11px;
  color: #4a5568;
  font-variant-numeric: tabular-nums;
  letter-spacing: 1px;
  margin-bottom: 3px;
  font-weight: 600;
}

.poke-name {
  font-size: 20px;
  font-weight: 800;
  color: #f5c518;
  letter-spacing: -0.3px;
  margin-bottom: 10px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.type-badges { display: flex; gap: 6px; flex-wrap: wrap; }

.type-badge {
  padding: 4px 11px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: #fff;
  text-shadow: 0 1px 3px rgba(0,0,0,0.4);
}

/* CARD BODY */
.card-body {
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.section-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 9px;
}
.lbl-weak4  { color: #ff4444; }
.lbl-weak2  { color: #ff8844; }
.lbl-resist { color: #44aaff; }
.lbl-immune { color: #556; }

.type-grid { display: flex; flex-wrap: wrap; gap: 7px; }

.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: #1a2235;
  border: 1px solid #2a3550;
  border-radius: 9px;
  padding: 5px 9px;
}

.chip-type {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #fff;
  padding: 3px 8px;
  border-radius: 5px;
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}

.chip-mult {
  font-size: 11px;
  font-weight: 800;
  padding: 2px 5px;
  border-radius: 4px;
  font-variant-numeric: tabular-nums;
}
.mult-4x  { color: #ff4444; background: rgba(255,68,68,0.12); }
.mult-2x  { color: #ff8844; background: rgba(255,136,68,0.12); }
.mult-05  { color: #44aaff; background: rgba(68,170,255,0.12); }
.mult-025 { color: #4488ff; background: rgba(68,136,255,0.12); }
.mult-0   { color: #556; background: rgba(85,85,102,0.15); }

/* Divider between sections */
.section-divider {
  height: 1px;
  background: #1a2235;
  margin: 0 -20px;
}

/* ── TAB BAR ─────────────────────────────────────────────── */
.tab-bar {
  display: flex;
  background: #0a0e1a;
  border-bottom: 1px solid #1a2235;
  position: sticky;
  top: 0;
  z-index: 200;
  padding: calc(10px + env(safe-area-inset-top)) 16px 10px;
  gap: 4px;
}
.tab-btn {
  flex: 1;
  padding: 14px 8px 12px;
  background: transparent;
  border: none;
  border-bottom: 0px solid transparent;
  color: #4a5568;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.3px;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.tab-btn.active { color: #f5c518; border-bottom-color: #f5c518; }
.tab-btn:active { opacity: 0.7; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── TEAM MATCHUP (inside type guide card) ───────────────── */
.team-matchup-section {
  padding: 16px 20px;
  border-top: 1px solid #1a2235;
}
.team-matchup-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #f5c518;
  margin-bottom: 10px;
}
.matchup-hint {
  font-size: 13px;
  color: #4a5568;
  font-style: italic;
}
.matchup-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid #0d1422;
}
.matchup-row:last-child { border-bottom: none; }
.matchup-poke-name {
  font-size: 12px;
  font-weight: 700;
  color: #e8eaf6;
  min-width: 64px;
  max-width: 80px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 0;
}
.matchup-moves {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}
.matchup-move-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: #1a2235;
  border: 1px solid #2a3550;
  border-radius: 7px;
  padding: 3px 8px;
  font-size: 11px;
  flex-wrap: wrap;
}
.matchup-move-name { color: #c8cfe8; font-weight: 500; }
.matchup-mult { font-size: 10px; font-weight: 800; }
.matchup-mult.x2 { color: #ff8844; }
.matchup-mult.x4 { color: #ff4444; }

.matchup-move-stats {
  display: flex;
  gap: 3px;
  align-items: center;
}
.matchup-stat-pill {
  font-size: 9px;
  color: #7986a8;
  background: #0d1422;
  border: 1px solid #1a2235;
  border-radius: 4px;
  padding: 1px 4px;
  white-space: nowrap;
}
.matchup-stat-pill b { color: #c8cfe8; }

/* Move stat pills under move inputs in My Team */
.move-stats-row {
  display: flex;
  gap: 4px;
  padding: 3px 8px 4px;
  align-items: center;
}
.move-stat-pill {
  font-size: 9px;
  color: #7986a8;
  background: #0d1422;
  border: 1px solid #1a2235;
  border-radius: 4px;
  padding: 1px 5px;
  white-space: nowrap;
}
.move-stat-pill b { color: #a8b8d8; }

/* ── TEAM BUILDER ────────────────────────────────────────── */
.team-section { padding: 20px 0 48px; }
.team-grid { display: flex; flex-direction: column; gap: 12px; }

.poke-slot {
  background: #111827;
  border: 1px solid #2a3550;
  border-radius: 16px;
  overflow: visible;
  transition: border-color 0.2s;
  min-width: 0;
  width: 100%;
}
.poke-slot.has-pokemon { border-color: #2e3f60; }
.slot-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  border-bottom: 1px solid #1a2235;
  min-width: 0;
}
.slot-num {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: #1a2235;
  border: 1px solid #2a3550;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #4a5568; flex-shrink: 0;
}
.has-pokemon .slot-num { background: #1e2d4a; border-color: #3a5080; color: #7986a8; }
.slot-poke-wrap { position: relative; flex: 1; min-width: 0; }
.slot-poke-input {
  width: 100%; background: transparent; border: none; outline: none;
  color: #e8eaf6;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
  font-size: 15px; font-weight: 600;
  -webkit-appearance: none; appearance: none;
}
.slot-poke-input::placeholder { color: #2a3550; font-weight: 400; }
.slot-types { display: flex; gap: 5px; flex-shrink: 0; flex-wrap: nowrap; }
.slot-clear {
  background: none; border: none; color: #3a4a60;
  font-size: 16px; cursor: pointer; padding: 2px 4px; line-height: 1;
  -webkit-tap-highlight-color: transparent; display: none;
}
.has-pokemon .slot-clear { display: block; }

/* Slot sprite */
.slot-sprite {
  width: 52px; height: 52px;
  object-fit: contain; flex-shrink: 0;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  display: none;
}
.has-pokemon .slot-sprite { display: block; }

/* Matchup row sprite */
.matchup-sprite {
  width: 36px; height: 36px;
  object-fit: contain; flex-shrink: 0;
  filter: drop-shadow(0 1px 4px rgba(0,0,0,0.5));
}

/* Slot autocomplete */
.slot-ac {
  position: fixed;
  background: #111827; border: 2px solid #2a3550; border-radius: 12px;
  max-height: 220px; overflow-y: auto; z-index: 300; display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6); -webkit-overflow-scrolling: touch;
}
.slot-ac.show { display: block; }
.slot-ac-item {
  padding: 10px 14px; cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; font-weight: 500;
  border-bottom: 1px solid #1a2235;
  -webkit-user-select: none; user-select: none;
}
.slot-ac-item:last-child { border-bottom: none; }
.slot-ac-item:active { background: #1a2235; }
.slot-ac-num { color: #4a5568; font-size: 11px; min-width: 38px; font-variant-numeric: tabular-nums; }
.slot-ac-types { margin-left: auto; display: flex; gap: 4px; }

/* Move slots */
.moves-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; padding: 10px 12px 12px;
  min-width: 0;
}
.move-slot { position: relative; min-width: 0; }
.move-input-wrap {
  display: flex; align-items: center;
  background: #0d1422; border: 1px solid #1a2235; border-radius: 9px;
  padding: 7px 8px; gap: 5px; transition: border-color 0.15s;
  min-width: 0; width: 100%; box-sizing: border-box;
}
.move-input-wrap:focus-within { border-color: #2a3550; }
.move-type-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #2a3550; flex-shrink: 0; transition: background 0.2s;
}
.move-input {
  flex: 1; background: transparent; border: none; outline: none;
  color: #e8eaf6;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
  font-size: 12px; font-weight: 500; min-width: 0;
  -webkit-appearance: none; appearance: none;
}
.move-input::placeholder { color: #2a3550; font-weight: 400; }
.move-type-label {
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
  color: #fff; padding: 2px 5px; border-radius: 4px; flex-shrink: 0; display: none;
}
.move-ac {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: #111827; border: 2px solid #2a3550; border-radius: 10px;
  max-height: 200px; overflow-y: auto; z-index: 400; display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.6); -webkit-overflow-scrolling: touch;
}
.move-ac.show { display: block; }
.move-ac-item {
  padding: 8px 11px; cursor: pointer;
  display: flex; align-items: center; gap: 8px; font-size: 12px;
  border-bottom: 1px solid #0d1422;
  -webkit-user-select: none; user-select: none;
}
.move-ac-item:last-child { border-bottom: none; }
.move-ac-item:active { background: #1a2235; }
.move-ac-name { flex: 1; font-weight: 500; color: #c8cfe8; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.move-ac-cat { font-size: 9px; color: #4a5568; flex-shrink: 0; }

/* ── COVERAGE TABLE ─────────────────────────────────────── */
.coverage-section { margin-top: 20px; }
.coverage-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 2px; color: #4a5568; margin-bottom: 12px; padding: 0 2px;
}
.coverage-table {
  background: #111827; border: 1px solid #2a3550; border-radius: 14px; overflow: hidden;
}
.cov-header-row {
  display: grid; grid-template-columns: 80px repeat(6, 1fr);
  background: #0d1422; border-bottom: 1px solid #1a2235;
}
.cov-col-head {
  padding: 7px 3px; text-align: center;
  font-size: 9px; font-weight: 700; color: #4a5568;
  border-right: 1px solid #1a2235;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.cov-col-head:last-child { border-right: none; }
.cov-row {
  display: grid; grid-template-columns: 80px repeat(6, 1fr);
  border-bottom: 1px solid #0d1422;
}
.cov-row:last-child { border-bottom: none; }
.cov-type-cell { padding: 5px 6px; display: flex; align-items: center; border-right: 1px solid #0d1422; }
.cov-cell {
  display: flex; align-items: center; justify-content: center;
  border-right: 1px solid #0d1422; min-height: 28px;
}
.cov-cell:last-child { border-right: none; }
.cov-check { font-size: 14px; }
.cov-dot { font-size: 10px; color: #1a2a3a; }
.team-hint {
  text-align: center; color: #2a3550; font-size: 13px;
  padding: 24px 0 8px; line-height: 1.7;
}

/* ── TYPE SPRITES ─────────────────────────────────────────── */
.type-sprite {
  display: inline-block;
  height: 26px;
  width: auto;
  vertical-align: middle;
  image-rendering: pixelated;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4));
}
.type-sprite.small {
  height: 20px;
}
.type-sprite.tiny {
  height: 16px;
}
.type-sprite-wrap {
  display: inline-flex;
  align-items: center;
}

/* chip with sprite */
.chip-type-sprite {
  display: inline-flex;
  align-items: center;
}

/* coverage table type cell */
.cov-type-cell .type-sprite { height: 20px; }

/* ── MOVE DEX TAB ─────────────────────────────────────────── */
.movedex-section { padding: 20px 0 48px; }

.movedex-search-wrap {
  position: relative;
  margin: 0 auto 16px;
}
.movedex-search-icon {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  font-size: 17px; pointer-events: none; opacity: 0.5;
}
#moveSearch, #itemSearch {
  width: 100%;
  padding: 15px 48px 15px 46px;
  background: #111827;
  border: 2px solid #2a3550;
  border-radius: 14px;
  color: #e8eaf6;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 17px; font-weight: 500;
  outline: none; -webkit-appearance: none; appearance: none;
  transition: border-color 0.2s;
}
#moveSearch:focus, #itemSearch:focus { border-color: #f5c518; }
#moveSearch::placeholder, #itemSearch::placeholder { color: #4a5568; font-weight: 400; }
.movedex-clear-btn {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: #2a3550; border: none; border-radius: 50%;
  width: 28px; height: 28px; color: #7986a8; font-size: 13px;
  cursor: pointer; display: none; align-items: center; justify-content: center;
  font-weight: 700;
}
.movedex-clear-btn.visible { display: flex; }
.movedex-clear-btn:active { background: #e84393; color: #fff; }

.movedex-filters {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px;
}
.movedex-filter-btn {
  display: inline-flex; align-items: center; gap: 5px;
  background: #111827; border: 1.5px solid #2a3550; border-radius: 20px;
  padding: 5px 7px; cursor: pointer; font-size: 11px; font-weight: 600;
  color: #7986a8; transition: border-color 0.15s, background 0.15s;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.movedex-filter-btn.active {
  border-color: #f5c518; background: rgba(245,197,24,0.07); color: #f5c518;
}
.movedex-filter-btn img { height: 16px; }

.movedex-cat-filters {
  display: flex; gap: 6px; margin-bottom: 14px;
}
.cat-btn {
  flex: 1; padding: 7px 4px; background: #111827;
  border: 1.5px solid #2a3550; border-radius: 10px;
  color: #4a5568; font-size: 11px; font-weight: 700;
  cursor: pointer; text-align: center; transition: all 0.15s;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.cat-btn.active.phys { border-color: #E8702A; color: #E8702A; background: rgba(232,112,42,0.08); }
.cat-btn.active.spec { border-color: #4A80E8; color: #4A80E8; background: rgba(74,128,232,0.08); }
.cat-btn.active.stat { border-color: #7986a8; color: #7986a8; background: rgba(121,134,168,0.08); }

// ── UI refs ──────────────────────────────────────────────────
const searchEl = document.getElementById('search');
const acList   = document.getElementById('autocomplete');
const resultEl = document.getElementById('result');
const clearBtn = document.getElementById('clearBtn');

let currentIndex = -1;
let filtered = [];

function tc(t) { return TYPE_COLORS[t] || '#777'; }

const TYPE_IDS = {
  Normal:1, Fighting:2, Flying:3, Poison:4, Ground:5, Rock:6,
  Bug:7, Ghost:8, Steel:9, Fire:10, Water:11, Grass:12,
  Electric:13, Psychic:14, Ice:15, Dragon:16, Dark:17, Fairy:18
};

const TYPE_SPRITE_BASE = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/types/generation-vi/omega-ruby-alpha-sapphire/';

function typeSprite(t, size) {
  const id = TYPE_IDS[t];
  if (!id) return `<span class="type-badge" style="background:${tc(t)};padding:3px 7px;font-size:10px">${t}</span>`;
  const cls = size === 'tiny' ? 'tiny' : size === 'small' ? 'small' : '';
  return `<img class="type-sprite ${cls}" src="${TYPE_SPRITE_BASE}${id}.png" alt="${t}" title="${t}" loading="lazy">`;
}

function badge(t, small) {
  return typeSprite(t, small ? 'small' : 'normal');
}

// Combine all searchable entries: regular Pokémon + regional forms
// Regional forms: [name, dexNum, types, spriteSlug]
const ALL_POKEMON = [
  ...POKEMON.map(p => ({ name: p[0], num: p[1], types: p[2], sprite: null, isRegional: false })),
  ...REGIONAL.map(p => ({ name: p[0], num: p[1], types: p[2], sprite: p[3], isRegional: true }))
];

function getSpriteUrl(entry) {
  if (entry.sprite) {
    // Regional form — use the PokeAPI form sprite endpoint
    return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${entry.sprite}.png`;
  }
  return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${entry.num}.png`;
}

function getFallbackUrl(entry) {
  if (entry.sprite) {
    return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/forms/${entry.sprite}.png`;
  }
  return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${entry.num}.png`;
}

function renderResult(entry) {
  const { name, num, types } = entry;
  const mu = getDefenseMatchups(types);
  const w4=[], w2=[], r2=[], r4=[], im=[];
  Object.entries(mu).forEach(([t,m])=>{
    if(m===4) w4.push(t);
    else if(m===2) w2.push(t);
    else if(m===0.5) r2.push(t);
    else if(m===0.25) r4.push(t);
    else if(m===0) im.push(t);
  });

  function section(label, lblCls, arr, multCls, multTxt) {
    if (!arr.length) return '';
    const chips = arr.map(t =>
      `<div class="chip">
        <span class="chip-type-sprite">${typeSprite(t, 'small')}</span>
        <span class="chip-mult ${multCls}">${multTxt}</span>
      </div>`
    ).join('');
    return `<div>
      <div class="section-label ${lblCls}">${label}</div>
      <div class="type-grid">${chips}</div>
    </div>`;
  }

  const spriteUrl = getSpriteUrl(entry);
  const fallback  = getFallbackUrl(entry);

  const sections = [
    section('⚠ Weak ×4',  'lbl-weak4',  w4, 'mult-4x', '×4'),
    section('Weak ×2',     'lbl-weak2',  w2, 'mult-2x', '×2'),
    section('Resists ×½',  'lbl-resist', r2, 'mult-05', '×½'),
    section('Resists ×¼',  'lbl-resist', r4, 'mult-025','×¼'),
    section('Immune ×0',   'lbl-immune', im, 'mult-0',  '×0'),
  ].filter(Boolean).join('<div class="section-divider"></div>');

  const teamMatchupHtml = buildTeamMatchup(types);

  resultEl.innerHTML = `
    <div class="card">
      <div class="card-header">
        <img class="poke-sprite" src="${spriteUrl}" alt="${name}"
          onerror="this.onerror=null;this.src='${fallback}'">
        <div class="poke-info">
          <div class="dex-num">#${String(num).padStart(4,'0')}</div>
          <div class="poke-name">${name}</div>
          <div class="type-badges">${types.map(t=>badge(t)).join('')}</div>
        </div>
      </div>
      <div class="card-body">
        ${sections || '<p style="color:#4a5568;font-size:14px">No notable type matchups.</p>'}
      </div>
      ${teamMatchupHtml}
    </div>`;
}

function clearSearch() {
  searchEl.value = '';
  clearBtn.classList.remove('visible');
  acList.classList.remove('show');
  resultEl.innerHTML = '<div class="hint">Search all 1025 Pokémon + regional forms (Alolan, Galarian, Hisuian, Paldean)</div>';
  searchEl.focus();
}

clearBtn.addEventListener('click', clearSearch);

function showAC(q) {
  if (!q) { acList.classList.remove('show'); return; }
  filtered = ALL_POKEMON.filter(p => p.name.toLowerCase().includes(q.toLowerCase())).slice(0,14);
  if (!filtered.length) { acList.classList.remove('show'); return; }
  acList.innerHTML = filtered.map((p,i) => {
    return `<div class="ac-item" data-idx="${i}">
      <span class="ac-num">#${String(p.num).padStart(4,'0')}</span>
      <span>${p.name}</span>
      <span class="ac-types">${p.types.map(t=>badge(t,true)).join('')}</span>
    </div>`;
  }).join('');
  currentIndex = -1;
  acList.classList.add('show');
}

acList.addEventListener('click', e => {
  const item = e.target.closest('.ac-item');
  if (item) pick(parseInt(item.dataset.idx));
});

function pick(i) {
  const p = filtered[i];
  if (!p) return;
  searchEl.value = p.name;
  clearBtn.classList.add('visible');
  acList.classList.remove('show');
  renderResult(p);
}

searchEl.addEventListener('input', e => {
  const v = e.target.value.trim();
  clearBtn.classList.toggle('visible', v.length > 0);
  showAC(v);
  if (!v) resultEl.innerHTML = '<div class="hint">Search all 1025 Pokémon + regional forms (Alolan, Galarian, Hisuian, Paldean)</div>';
});

searchEl.addEventListener('keydown', e => {
  const items = acList.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    currentIndex = Math.min(currentIndex+1, items.length-1);
    items.forEach((el,i) => el.classList.toggle('selected', i===currentIndex));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    currentIndex = Math.max(currentIndex-1, -1);
    items.forEach((el,i) => el.classList.toggle('selected', i===currentIndex));
  } else if (e.key === 'Enter') {
    if (currentIndex >= 0) { pick(currentIndex); return; }
    const q = searchEl.value.trim().toLowerCase();
    const ex = ALL_POKEMON.findIndex(p => p.name.toLowerCase() === q);
    if (ex >= 0) renderResult(ALL_POKEMON[ex]);
    else if (filtered.length) pick(0);
    acList.classList.remove('show');
  } else if (e.key === 'Escape') {
    acList.classList.remove('show');
  }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) acList.classList.remove('show');
});

let moveDexInited = false;
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'team') renderTeamGrid();
  if (name === 'moves' && !moveDexInited) { moveDexInited = true; initMoveDex(); }
  if (name === 'items' && !itemDexInited) { itemDexInited = true; initItemDex(); }
}

// ── TEAM STATE ────────────────────────────────────────────
let team = Array.from({length:6}, () => ({ pokemon: null, moves: [null,null,null,null] }));
function loadTeam() {
  try {
    const s = JSON.parse(localStorage.getItem('lazarus_team') || 'null');
    if (s && Array.isArray(s) && s.length === 6) team = s;
  } catch {}
}
function saveTeam() { localStorage.setItem('lazarus_team', JSON.stringify(team)); }
loadTeam();

// ── TEAM MATCHUP (shown in type guide card) ───────────────
function buildTeamMatchup(defTypes) {
  const hasTeam = team.some(s => s.pokemon && s.moves.some(Boolean));
  if (!hasTeam) {
    return `<div class="team-matchup-section">
      <div class="team-matchup-label">🎯 Your Team</div>
      <div class="matchup-hint">Add Pokémon & moves in the My Team tab to see coverage suggestions here</div>
    </div>`;
  }

  const rows = [];
  team.forEach(slot => {
    if (!slot.pokemon) return;
    const goodMoves = slot.moves.filter(m => {
      if (!m) return false;
      // Check how effective this move type is vs defTypes
      let mult = 1;
      defTypes.forEach(dt => {
        const v = CHART[m.type] && CHART[m.type][dt];
        if (v !== undefined) mult *= v;
      });
      return mult >= 2;
    });
    if (!goodMoves.length) return;

    const moveBadges = goodMoves.map(m => {
      let mult = 1;
      defTypes.forEach(dt => {
        const v = CHART[m.type] && CHART[m.type][dt];
        if (v !== undefined) mult *= v;
      });
      const cls = mult >= 4 ? 'x4' : 'x2';
      const txt = mult >= 4 ? '×4' : '×2';
      const stats = MOVE_STATS[m.name] || [null, null];
      const pw = stats[0] !== null && stats[0] !== undefined ? stats[0] : '—';
      const ac = stats[1] !== null && stats[1] !== undefined ? stats[1] + '%' : '∞';
      const statsHtml = (m.cat !== 'T')
        ? `<span class="matchup-move-stats"><span class="matchup-stat-pill">PWR&nbsp;<b>${pw}</b></span><span class="matchup-stat-pill">ACC&nbsp;<b>${ac}</b></span></span>`
        : '';
      return `<div class="matchup-move-badge">
        ${typeSprite(m.type, 'tiny')}
        <span class="matchup-move-name">${m.name}</span>
        ${statsHtml}
        <span class="matchup-mult ${cls}">${txt}</span>
      </div>`;
    }).join('');

    rows.push(`<div class="matchup-row">
      <img class="matchup-sprite" src="${getSpriteUrl(slot.pokemon)}" alt="${slot.pokemon.name}"
        onerror="this.onerror=null;this.src='${getFallbackUrl(slot.pokemon)}'">
      <span class="matchup-poke-name">${slot.pokemon.name}</span>
      <div class="matchup-moves">${moveBadges}</div>
    </div>`);
  });

  if (!rows.length) {
    return `<div class="team-matchup-section">
      <div class="team-matchup-label">🎯 Your Team</div>
      <div class="matchup-hint">None of your team's moves are super-effective against this Pokémon</div>
    </div>`;

  MOVE_MAP[m[0].toLowerCase()] = { name: m[0], type: m[1], cat: m[2], power: stats[0], acc: stats[1] };
});

// Helper to format power/accuracy display
function movePowerAccStr(mv) {
  const stats = MOVE_STATS[mv.name] || [null, null];
  const pw = stats[0] !== null && stats[0] !== undefined ? stats[0] : '—';
  const ac = stats[1] !== null && stats[1] !== undefined ? stats[1] + '%' : '∞';
  // Only show for damaging moves (not status)
  if (mv.cat === 'T') return null;
  return `<span class="move-stat-pill">PWR&nbsp;<b>${pw}</b></span><span class="move-stat-pill">ACC&nbsp;<b>${ac}</b></span>`;
}

// ── TEAM GRID RENDER ──────────────────────────────────────
function renderTeamGrid() {
  const grid = document.getElementById('teamGrid');
  grid.innerHTML = '';
  for (let i = 0; i < 6; i++) grid.appendChild(buildSlot(i));
  renderCoverage();
}

function buildSlot(idx) {
  const slot = document.createElement('div');
  slot.className = 'poke-slot' + (team[idx].pokemon ? ' has-pokemon' : '');

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'slot-header';
  const num = document.createElement('div');
  num.className = 'slot-num';
  num.textContent = idx + 1;

  // Sprite
  const spriteImg = document.createElement('img');
  spriteImg.className = 'slot-sprite';
  spriteImg.alt = '';
  if (team[idx].pokemon) {
    const entry = team[idx].pokemon;
    const spriteUrl = getSpriteUrl(entry);
    const fallback  = getFallbackUrl(entry);
    spriteImg.src = spriteUrl;
    spriteImg.onerror = function() { this.onerror=null; this.src=fallback; };
  }

  const wrap = document.createElement('div');
  wrap.className = 'slot-poke-wrap';
  const inp = document.createElement('input');
  inp.className = 'slot-poke-input';
  inp.type = 'text';
  inp.placeholder = 'Add Pokémon…';
  inp.autocomplete = inp.autocorrect = 'off';
  inp.autocapitalize = 'off';
  inp.spellcheck = false;
  inp.value = team[idx].pokemon ? team[idx].pokemon.name : '';
  const ac = document.createElement('div');
  ac.className = 'slot-ac';

  let slotFiltered = [];
  inp.addEventListener('input', () => {
    const q = inp.value.trim();
    if (!q) { ac.classList.remove('show'); return; }
    slotFiltered = ALL_POKEMON.filter(p => p.name.toLowerCase().includes(q.toLowerCase())).slice(0, 10);
    if (!slotFiltered.length) { ac.classList.remove('show'); return; }
    ac.innerHTML = slotFiltered.map((p, i) =>
      `<div class="slot-ac-item" data-idx="${i}">
        <span class="slot-ac-num">#${String(p.num).padStart(4,'0')}</span>
        <span>${p.name}</span>
        <span class="slot-ac-types">${p.types.map(t=>badge(t,true)).join('')}</span>
      </div>`
    ).join('');
    const rect = inp.getBoundingClientRect();
    ac.style.top = (rect.bottom + 6) + 'px';
    ac.classList.add('show');
  });
  ac.addEventListener('click', e => {
    const item = e.target.closest('.slot-ac-item');
    if (!item) return;
    const p = slotFiltered[parseInt(item.dataset.idx)];
    if (!p) return;
    team[idx].pokemon = p;
    saveTeam();
    renderTeamGrid();
  });
  inp.addEventListener('blur', () => setTimeout(() => ac.classList.remove('show'), 150));

  const types = document.createElement('div');
  types.className = 'slot-types';
  if (team[idx].pokemon) types.innerHTML = team[idx].pokemon.types.map(t => badge(t, true)).join('');

  const clr = document.createElement('button');
  clr.className = 'slot-clear';
  clr.innerHTML = '✕';
  clr.addEventListener('click', () => {
    team[idx] = { pokemon: null, moves: [null,null,null,null] };
    saveTeam();
    renderTeamGrid();
  });

  wrap.appendChild(inp); wrap.appendChild(ac);
  hdr.appendChild(num); hdr.appendChild(spriteImg); hdr.appendChild(wrap); hdr.appendChild(types); hdr.appendChild(clr);
  slot.appendChild(hdr);

  // Moves
  const movesGrid = document.createElement('div');
  movesGrid.className = 'moves-grid';
  for (let m = 0; m < 4; m++) movesGrid.appendChild(buildMoveSlot(idx, m));
  slot.appendChild(movesGrid);
  return slot;
}

function buildMoveSlot(slotIdx, moveIdx) {
  const wrap = document.createElement('div');
  wrap.className = 'move-slot';
  const innerWrap = document.createElement('div');
  innerWrap.className = 'move-input-wrap';
  const dot = document.createElement('div');
  dot.className = 'move-type-dot';
  const inp = document.createElement('input');
  inp.className = 'move-input';
  inp.type = 'text';
  inp.placeholder = 'Move ' + (moveIdx + 1);
  inp.autocomplete = inp.autocorrect = 'off';
  inp.autocapitalize = 'off';
  inp.spellcheck = false;
  const typeLabel = document.createElement('span');
  typeLabel.className = 'move-type-label';

  const saved = team[slotIdx].moves[moveIdx];
  if (saved) {
    inp.value = saved.name;
    dot.style.background = TYPE_COLORS[saved.type] || '#2a3550';
    typeLabel.style.background = TYPE_COLORS[saved.type] || '#2a3550';
    typeLabel.textContent = saved.type;
    typeLabel.style.display = 'inline-block';
  }

  const ac = document.createElement('div');
  ac.className = 'move-ac';

  let moveFiltered = [];
  inp.addEventListener('input', () => {
    const q = inp.value.trim().toLowerCase();
    if (q.length < 2) { ac.classList.remove('show'); return; }
    moveFiltered = MOVES.filter(m => m[0].toLowerCase().includes(q)).slice(0, 12);
    if (!moveFiltered.length) { ac.classList.remove('show'); return; }
    ac.innerHTML = moveFiltered.map((m, i) =>
      `<div class="move-ac-item" data-idx="${i}">
        <span class="move-ac-name">${m[0]}</span>
        ${typeSprite(m[1], 'tiny')}
        <span class="move-ac-cat">${m[2]==='P'?'Phys':m[2]==='S'?'Spec':'Stat'}</span>
      </div>`
    ).join('');
    ac.classList.add('show');
  });

  const applyMove = (mv) => {
    const stats = MOVE_STATS[mv[0]] || [null, null];
    team[slotIdx].moves[moveIdx] = { name: mv[0], type: mv[1], cat: mv[2], power: stats[0], acc: stats[1] };
    saveTeam();
    inp.value = mv[0];
    dot.style.background = TYPE_COLORS[mv[1]] || '#2a3550';
    typeLabel.style.background = TYPE_COLORS[mv[1]] || '#2a3550';
    typeLabel.textContent = mv[1];
    typeLabel.style.display = 'inline-block';
    ac.classList.remove('show');
    // Update stats display
    updateMoveStats();
    renderCoverage();
  };

  function updateMoveStats() {
    const existing = wrap.querySelector('.move-stats-row');
    if (existing) existing.remove();
    const saved = team[slotIdx].moves[moveIdx];
    if (saved && saved.cat !== 'T') {
      const pw = saved.power !== null && saved.power !== undefined ? saved.power : '—';
      const ac = saved.acc !== null && saved.acc !== undefined ? saved.acc + '%' : '∞';
      const statsRow = document.createElement('div');
      statsRow.className = 'move-stats-row';
      statsRow.innerHTML = `<span class="move-stat-pill">PWR&nbsp;<b>${pw}</b></span><span class="move-stat-pill">ACC&nbsp;<b>${ac}</b></span>`;
      wrap.appendChild(statsRow);
    }
  }
  updateMoveStats();

  ac.addEventListener('click', e => {
    const item = e.target.closest('.move-ac-item');
    if (item) applyMove(moveFiltered[parseInt(item.dataset.idx)]);
  });

  inp.addEventListener('blur', () => {
    setTimeout(() => {
      ac.classList.remove('show');
      const q = inp.value.trim().toLowerCase();
      const exact = MOVE_MAP[q];
      if (exact && (!team[slotIdx].moves[moveIdx] || team[slotIdx].moves[moveIdx].name !== exact.name)) {
        applyMove([exact.name, exact.type, exact.cat]);
      }
    }, 180);
  });

  inp.addEventListener('input', () => {
    if (!inp.value.trim()) {
      team[slotIdx].moves[moveIdx] = null;
      dot.style.background = '#2a3550';
      typeLabel.style.display = 'none';
      const existing = wrap.querySelector('.move-stats-row');
      if (existing) existing.remove();
      saveTeam(); renderCoverage();
    }
  });

  innerWrap.appendChild(dot); innerWrap.appendChild(inp); innerWrap.appendChild(typeLabel);
  wrap.appendChild(innerWrap); wrap.appendChild(ac);
  return wrap;
}

// ── COVERAGE TABLE (checkmark only) ──────────────────────
const ALL_TYPES = ['Normal','Fire','Water','Electric','Grass','Ice','Fighting','Poison',
                   'Ground','Flying','Psychic','Bug','Rock','Ghost','Dragon','Dark','Steel','Fairy'];

function renderCoverage() {
  const container = document.getElementById('coverageTable');
  const slotMoveTypes = team.map(slot => slot.moves.filter(Boolean).map(m => m.type));
  const hasAny = slotMoveTypes.some(mt => mt.length > 0) || team.some(s => s.pokemon);
  if (!hasAny) {
    container.innerHTML = '<div class="team-hint">Add Pokémon and moves above to see coverage</div>';
    return;
  }

  const colNames = team.map((s, i) =>
    s.pokemon ? s.pokemon.name.split(' ')[0].substring(0, 7) : '—'
  );

  let html = `<div class="coverage-table">
    <div class="cov-header-row">
      <div class="cov-col-head" style="font-size:8px;color:#3a4a60">TYPE ↓</div>
      ${colNames.map((n, i) => {
        const active = slotMoveTypes[i].length > 0;
        return `<div class="cov-col-head" style="color:${active?'#c8cfe8':'#2a3550'}">${n}</div>`;
      }).join('')}
    </div>`;

  ALL_TYPES.forEach(defType => {
    html += `<div class="cov-row">
      <div class="cov-type-cell">
        ${typeSprite(defType, 'tiny')}
      </div>`;
    team.forEach((slot, si) => {
      const moveTypes = slotMoveTypes[si];
      if (!moveTypes.length) {
        html += `<div class="cov-cell"><span class="cov-dot">·</span></div>`;
        return;
      }
      let best = 1;
      moveTypes.forEach(mt => {
        const v = CHART[mt] && CHART[mt][defType];
        const eff = v !== undefined ? v : 1;
        if (eff > best) best = eff;
      });
      if (best >= 2) {
        html += `<div class="cov-cell"><span class="cov-check">✓</span></div>`;
      } else {
        html += `<div class="cov-cell"><span class="cov-dot">·</span></div>`;
      }
    });
    html += `</div>`;
  });

  html += '</div>';
  container.innerHTML = html;
}

// ── MOVE DEX ─────────────────────────────────────────────────
let moveDexQuery = '';
let moveDexTypeFilter = null; // null = all, or a type name
let moveDexCatFilters = new Set(); // empty = all cats

const ALL_TYPE_NAMES = ['Normal','Fire','Water','Electric','Grass','Ice','Fighting','Poison',
                        'Ground','Flying','Psychic','Bug','Rock','Ghost','Dragon','Dark','Steel','Fairy'];

function initMoveDex() {
  const filtersEl = document.getElementById('moveTypeFilters');
  filtersEl.innerHTML = ALL_TYPE_NAMES.map(t =>
    `<button class="movedex-filter-btn" data-type="${t}" onclick="toggleTypeFilter('${t}')" title="${t}">
      ${typeSprite(t, 'tiny')}
    </button>`
  ).join('');

  document.getElementById('moveSearch').addEventListener('input', function() {
    moveDexQuery = this.value.trim();
    document.getElementById('moveClearBtn').classList.toggle('visible', moveDexQuery.length > 0);
    renderMoveDex();
  });

  document.getElementById('moveClearBtn').addEventListener('click', function() {
    document.getElementById('moveSearch').value = '';
    moveDexQuery = '';
    this.classList.remove('visible');
    renderMoveDex();
  });

  renderMoveDex();
}

function toggleTypeFilter(t) {
  moveDexTypeFilter = moveDexTypeFilter === t ? null : t;
  document.querySelectorAll('.movedex-filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.type === moveDexTypeFilter);
  });
  renderMoveDex();
}

function toggleCat(c) {
  if (moveDexCatFilters.has(c)) moveDexCatFilters.delete(c);
  else moveDexCatFilters.add(c);
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.classList.toggle('active', moveDexCatFilters.has(btn.dataset.cat));
  });
  renderMoveDex();
}

function renderMoveDex() {
  const q = moveDexQuery.toLowerCase();
  let results = MOVES;

  if (q.length >= 1) {
    results = results.filter(m => m[0].toLowerCase().includes(q));
  }
  if (moveDexTypeFilter) {
    results = results.filter(m => m[1] === moveDexTypeFilter);
  }
  if (moveDexCatFilters.size > 0) {
    results = results.filter(m => moveDexCatFilters.has(m[2]));
  }

  const header = document.getElementById('moveDexHeader');
  const list = document.getElementById('moveDexList');

  header.textContent = results.length === MOVES.length
    ? `All Moves (${MOVES.length})`
    : `${results.length} Move${results.length !== 1 ? 's' : ''} Found`;

  if (!results.length) {
    list.innerHTML = `<div class="movedex-empty">No moves match your search.</div>`;
    return;
  }

  // Limit to 200 for performance when no filters active
  const toShow = results.slice(0, 200);
  const catMap = { P: 'phys', S: 'spec', T: 'stat' };
  const catLabel = { P: 'Phys', S: 'Spec', T: 'Status' };

  list.innerHTML = toShow.map(m => {
    const stats = MOVE_STATS[m[0]] || [null, null];
    const pw = m[2] !== 'T' ? (stats[0] !== null && stats[0] !== undefined ? stats[0] : '—') : null;
    const ac = stats[1] !== null && stats[1] !== undefined ? stats[1] + '%' : '∞';
    const statHtml = m[2] !== 'T'
      ? `<div class="movedex-stats">
          <span class="movedex-stat-pill">PWR&nbsp;<b>${pw}</b></span>
          <span class="movedex-stat-pill">ACC&nbsp;<b>${ac}</b></span>
        </div>`
      : '';
    return `<div class="movedex-row">
      ${typeSprite(m[1], 'small')}
      <span class="movedex-name">${m[0]}</span>
      ${statHtml}
      <span class="movedex-cat ${catMap[m[2]]}">${catLabel[m[2]]}</span>
    </div>`;
  }).join('');

  if (results.length > 200) {
    list.innerHTML += `<div class="movedex-empty" style="padding:16px 0">Showing first 200 of ${results.length} — refine your search to see more</div>`;
  }
}

// Get the move type for a machine item name (e.g. "TM001" → "Normal")
function getMachineType(name) {
  const entry = TM_MOVE_MAP[name.toUpperCase()];
  return entry ? entry[1] : null;
}

// Get sprite URL for a machine item
function getMachineSprite(type) {
  if (!type) return null;
  return TM_SPRITE_BASE + type.toLowerCase() + '.png';
}

let itemQuery = '';
let itemCatFilter = null;
let itemTypeFilter = null; // type sub-filter for machines
let itemDexInited = false;
let itemFiltered = [];
let itemCurrentIndex = -1;

const ALL_TYPES_ORDERED = ['Normal','Fire','Water','Electric','Grass','Ice','Fighting','Poison','Ground','Flying','Psychic','Bug','Rock','Ghost','Dragon','Dark','Steel','Fairy'];

function initItemDex() {
  const filtersEl = document.getElementById('itemCatFilters');
  filtersEl.innerHTML = ITEM_CATEGORIES.map(c =>
    `<button class="item-cat-filter-btn" data-cat="${c.id}" onclick="toggleItemCat('${c.id}')">
      <span class="itemdex-cat-badge ${c.cls}">${c.label}</span>
    </button>`
  ).join('');

  renderTypeFilters();

  const searchEl = document.getElementById('itemSearch');
  const acList   = document.getElementById('itemAutocomplete');
  const clearBtn = document.getElementById('itemClearBtn');

  function highlightMatch(text, q) {
    if (!q) return text;
    const idx = text.toLowerCase().indexOf(q.toLowerCase());
    if (idx === -1) return text;
    return text.slice(0, idx)
      + `<mark style="background:rgba(245,197,24,0.25);color:#f5c518;border-radius:2px;padding:0 1px">${text.slice(idx, idx + q.length)}</mark>`
      + text.slice(idx + q.length);
  }

  function spriteForItem(item) {
    const [name, cat, , slug] = item;
    if (cat === 'machine') {
      const type = getMachineType(name);
      const sp = getMachineSprite(type);
      if (sp) return `<img class="item-sprite" src="${sp}" alt="${name}" loading="lazy" onerror="this.src='${ITEM_SPRITE_BASE}${slug}.png';this.onerror=null">`;
    }
    if (slug) return `<img class="item-sprite" src="${ITEM_SPRITE_BASE}${slug}.png" alt="${name}" loading="lazy" onerror="this.style.display='none'">`;
    return `<div style="width:24px;height:24px;flex-shrink:0"></div>`;
  }

  function typeBadgeForItem(item) {
    const [name, cat] = item;
    if (cat !== 'machine') return '';
    const type = getMachineType(name);
    if (!type) return '';
    return typeSprite(type, 'tiny');
  }

  function showItemAC(q) {
    if (!q) { acList.classList.remove('show'); return; }
    const matches = getItemResults(q, itemCatFilter, itemTypeFilter).slice(0, 14);
    itemFiltered = matches;
    if (!matches.length) { acList.classList.remove('show'); return; }
    acList.innerHTML = matches.map((item, i) => {
      const [name, cat, effect] = item;
      const catInfo = ITEM_CATEGORIES.find(c => c.id === cat) || {label: cat, cls:'itemcat-other'};
      return `<div class="item-ac-item" data-idx="${i}">
        ${spriteForItem(item)}
        <span class="item-ac-name">${highlightMatch(name, q)}</span>
        <span class="item-ac-effect">${effect || ''}</span>
        ${typeBadgeForItem(item)}
        <span class="itemdex-cat-badge ${catInfo.cls}" style="flex-shrink:0">${catInfo.label}</span>
      </div>`;
    }).join('');
    itemCurrentIndex = -1;
    acList.classList.add('show');
  }

  searchEl.addEventListener('input', () => {
    const v = searchEl.value.trim();
    itemQuery = v;
    clearBtn.classList.toggle('visible', v.length > 0);
    showItemAC(v);
    if (!v) { renderItemDex(); }
  });

  searchEl.addEventListener('keydown', e => {
    const items = acList.querySelectorAll('.item-ac-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      itemCurrentIndex = Math.min(itemCurrentIndex + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('selected', i === itemCurrentIndex));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      itemCurrentIndex = Math.max(itemCurrentIndex - 1, -1);
      items.forEach((el, i) => el.classList.toggle('selected', i === itemCurrentIndex));
    } else if (e.key === 'Enter') {
      if (itemCurrentIndex >= 0 && itemFiltered[itemCurrentIndex]) {
        pickItem(itemCurrentIndex, searchEl, acList);
      } else if (itemFiltered.length) {
        pickItem(0, searchEl, acList);
      }
      acList.classList.remove('show');
    } else if (e.key === 'Escape') {
      acList.classList.remove('show');
    }
  });

  acList.addEventListener('click', e => {
    const item = e.target.closest('.item-ac-item');
    if (item) pickItem(parseInt(item.dataset.idx), searchEl, acList);
  });

  searchEl.addEventListener('blur', () => {
    setTimeout(() => acList.classList.remove('show'), 150);
  });

  clearBtn.addEventListener('click', () => {
    searchEl.value = '';
    itemQuery = '';
    clearBtn.classList.remove('visible');
    acList.classList.remove('show');
    itemFiltered = [];
    renderItemDex();
    searchEl.focus();
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('#panel-items .movedex-search-wrap')) acList.classList.remove('show');
  });

  renderItemDex();
}

function renderTypeFilters() {
  const el = document.getElementById('itemTypeFilters');
  if (itemCatFilter !== 'machine') {
    el.style.display = 'none';
    return;
  }
  el.style.display = 'flex';
  el.innerHTML = `<button class="item-type-filter-btn${!itemTypeFilter ? ' active' : ''}" onclick="toggleItemType(null)"
    style="background:#111827;border:1.5px solid ${itemTypeFilter ? '#2a3550' : '#f5c518'};border-radius:20px;padding:5px 10px;cursor:pointer;font-size:11px;font-weight:600;color:${itemTypeFilter ? '#7986a8' : '#f5c518'};-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent">
    All Types
  </button>`
  + ALL_TYPES_ORDERED.map(t => {
    const active = itemTypeFilter === t;
    return `<button class="item-type-filter-btn${active ? ' active' : ''}" data-type="${t}" onclick="toggleItemType('${t}')"
      style="display:inline-flex;align-items:center;gap:4px;background:#111827;border:1.5px solid ${active ? TYPE_COLORS[t] : '#2a3550'};border-radius:20px;padding:4px 8px;cursor:pointer;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent">
      ${typeSprite(t,'tiny')}
    </button>`;
  }).join('');
}

function pickItem(idx, searchEl, acList) {
  const item = itemFiltered[idx];
  if (!item) return;
  searchEl.value = item[0];
  itemQuery = item[0];
  document.getElementById('itemClearBtn').classList.add('visible');
  acList.classList.remove('show');
  renderItemDex();
}

function toggleItemCat(cat) {
  itemCatFilter = itemCatFilter === cat ? null : cat;
  if (itemCatFilter !== 'machine') itemTypeFilter = null;
  document.querySelectorAll('.item-cat-filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === itemCatFilter);
  });
  renderTypeFilters();
  renderItemDex();
}

function toggleItemType(type) {
  itemTypeFilter = itemTypeFilter === type ? null : type;
  renderTypeFilters();
  renderItemDex();
}

function getItemResults(q, catFilter, typeFilter) {
  const lq = q ? q.toLowerCase() : '';
  return ITEMS.filter(i => {
    const matchesQ = !lq || i[0].toLowerCase().includes(lq) || i[2].toLowerCase().includes(lq);
    const matchesCat = !catFilter || i[1] === catFilter;
    let matchesType = true;
    if (typeFilter && i[1] === 'machine') {
      matchesType = getMachineType(i[0]) === typeFilter;
    }
    return matchesQ && matchesCat && matchesType;
  }).sort((a, b) => {
    // Sort machines: HMs first, then by TM number
    if (a[1] === 'machine' && b[1] === 'machine') {
      const aIsHM = a[0].startsWith('HM'), bIsHM = b[0].startsWith('HM');
      if (aIsHM && !bIsHM) return -1;
      if (!aIsHM && bIsHM) return 1;
      return a[0].localeCompare(b[0], undefined, {numeric: true});
    }
    return a[0].localeCompare(b[0]);
  });
}

function renderItemDex() {
  const results = getItemResults(itemQuery, itemCatFilter, itemTypeFilter);

  const header = document.getElementById('itemDexHeader');
  const list = document.getElementById('itemDexList');

  header.textContent = results.length === ITEMS.length
    ? `All Items (${ITEMS.length})`
    : `${results.length} Item${results.length !== 1 ? 's' : ''} Found`;

  if (!results.length) {
    list.innerHTML = `<div class="movedex-empty">No items match your search.</div>`;
    return;
  }

  const toShow = results.slice(0, 400);

  list.innerHTML = toShow.map(item => {
    const [name, cat, effect, slug] = item;
    const catInfo = ITEM_CATEGORIES.find(c => c.id === cat) || {label: cat, cls:'itemcat-other'};
    const isMachine = cat === 'machine';
    const machineType = isMachine ? getMachineType(name) : null;

    // Sprite: TM type sprite for machines, regular item sprite for others
    let imgHtml;
    if (isMachine && machineType) {
      const tmSrc = getMachineSprite(machineType);
      imgHtml = `<img class="item-sprite" src="${tmSrc}" alt="${name}" loading="lazy" onerror="this.src='${ITEM_SPRITE_BASE}${slug}.png';this.onerror=null">`;
    } else if (slug) {
      imgHtml = `<img class="item-sprite" src="${ITEM_SPRITE_BASE}${slug}.png" alt="${name}" loading="lazy" onerror="this.style.display='none'">`;
    } else {
      imgHtml = `<div style="width:24px;height:24px;flex-shrink:0"></div>`;
    }

    // Type badge shown inline for machines
    const typeBadge = (isMachine && machineType)
      ? `<span style="display:inline-flex;align-items:center;margin-left:6px">${typeSprite(machineType, 'tiny')}</span>`
      : '';

    // Move name label for machines
    const moveLabel = isMachine && TM_MOVE_MAP[name.toUpperCase()]
      ? `<span style="font-size:10px;color:#7986a8;margin-left:4px">${TM_MOVE_MAP[name.toUpperCase()][0]}</span>`
      : '';

    return `<div class="itemdex-row">
      ${imgHtml}
      <div class="itemdex-info">
        <div class="itemdex-name" style="display:flex;align-items:center;flex-wrap:wrap;gap:2px">${name}${moveLabel}${typeBadge}</div>
        ${effect ? `<div class="itemdex-effect">${effect}</div>` : ''}
      </div>
      <span class="itemdex-cat-badge ${catInfo.cls}">${catInfo.label}</span>
    </div>`;
  }).join('');

  if (results.length > 400) {
    list.innerHTML += `<div class="movedex-empty" style="padding:16px 0">Showing first 400 of ${results.length} — refine your search to see more</div>`;
  }
}
