<html lang="en">
<head>

    <title>Pokémon Lazarus — Full Encounter Tracker (Excel Data)</title>
    <style>
        :root {
            --bg: #0a0a16; --surface: #12122a; --surface2: #181835;
            --border: #252545; --text: #e0e4f0; --text-muted: #8890a8;
            --accent: #4ade80; --accent2: #60a5fa; --danger: #f87171;
            --warning: #fbbf24; --special: #c084fc;
            --radius: 12px; --radius-sm: 7px; --transition: 0.18s ease;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --shadow-card: 0 2px 16px rgba(0,0,0,0.35);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;line-height:1.45;
            background-image:radial-gradient(ellipse at 20% 8%,rgba(74,222,128,0.03) 0%,transparent 55%),
            radial-gradient(ellipse at 80% 88%,rgba(96,165,250,0.03) 0%,transparent 55%)}
        .app{max-width:960px;margin:0 auto;padding:16px 12px 50px}
        .header{text-align:center;padding:28px 16px 14px}
        .header-icon{font-size:42px;display:block;margin-bottom:4px;animation:float 3s infinite}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        .header h1{font-size:1.75rem;font-weight:800;background:linear-gradient(135deg,#4ade80,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .subtitle{color:var(--text-muted);font-size:0.82rem}
        .stats-bar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:10px 0 6px}
        .stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 15px;text-align:center;min-width:70px}
        .stat-value{font-size:1.4rem;font-weight:700;color:var(--accent)}
        .stat-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted)}
        .progress-container{display:flex;justify-content:center;margin:8px 0 14px}
        .progress-ring{position:relative;width:80px;height:80px}
        .progress-ring svg{transform:rotate(-90deg);width:80px;height:80px}
        .bg-circle{fill:none;stroke:var(--border);stroke-width:5}
        .fg-circle{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;transition:0.45s}
        .ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:var(--accent)}
        .search-wrapper{position:relative;margin:0 0 14px}
        .search-input{width:100%;padding:12px 44px 12px 18px;background:var(--surface2);border:2px solid var(--border);border-radius:50px;color:var(--text);font-size:0.95rem;font-family:var(--font);outline:none}
        .search-input:focus{border-color:var(--accent2);box-shadow:0 0 0 4px rgba(96,165,250,0.08)}
        .search-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:1.1rem;color:var(--text-muted);pointer-events:none}
        .search-results{position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);max-height:260px;overflow-y:auto;z-index:20;display:none;box-shadow:var(--shadow-card)}
        .search-results.active{display:block}
        .search-result-item{padding:9px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);font-size:0.85rem}
        .search-result-item:hover{background:rgba(255,255,255,0.03)}
        .result-name{font-weight:600;flex:1}
        .result-meta{font-size:0.7rem;color:var(--text-muted)}
        .badge-caught{background:var(--accent);color:#000;font-size:0.6rem;padding:2px 7px;border-radius:20px;font-weight:700}
        .no-results{padding:14px;text-align:center;color:var(--text-muted)}
        .tab-bar{display:flex;gap:8px;margin-bottom:16px}
        .tab-btn{flex:1;padding:10px;border-radius:50px;font-size:0.85rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);text-align:center}
        .tab-btn.active{background:var(--accent);border-color:var(--accent);color:#000}
        .area-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow-card)}
        .area-card.highlight{border-color:var(--accent2);box-shadow:0 0 20px rgba(96,165,250,0.18)}
        .area-header{padding:13px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border-bottom:1px solid var(--border);user-select:none}
        .area-header:hover{background:rgba(255,255,255,0.02)}
        .area-title{display:flex;align-items:center;gap:8px;font-weight:700;font-size:0.95rem}
        .area-icon{font-size:1.2rem}
        .area-meta{display:flex;align-items:center;gap:8px;font-size:0.73rem;color:var(--text-muted)}
        .area-progress{font-weight:600;color:var(--accent)}
        .chevron{font-size:0.7rem;color:var(--text-muted);transition:0.2s}
        .area-card.collapsed .chevron{transform:rotate(-90deg)}
        .area-card.collapsed .area-body{display:none}
        .area-body{padding:4px 0}
        .area-subsection{padding:6px 16px 3px;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);font-weight:600}
        .poke-row,.pokedex-row{display:flex;align-items:center;gap:10px;padding:7px 16px;cursor:pointer;border-left:3px solid transparent;font-size:0.85rem}
        .poke-row:hover,.pokedex-row:hover{background:rgba(255,255,255,0.02)}
        .poke-row.caught,.pokedex-row.caught{border-left-color:var(--accent);background:rgba(74,222,128,0.04)}
        .check-circle{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.6rem;flex-shrink:0;background:transparent;color:transparent}
        .caught .check-circle{background:var(--accent);border-color:var(--accent);color:#000;box-shadow:0 0 10px rgba(74,222,128,0.3)}
        .poke-info{flex:1}
        .poke-name{font-weight:600;font-size:0.83rem}
        .caught .poke-name{color:var(--accent)}
        .poke-badge{font-size:0.65rem;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap;flex-shrink:0}
        .badge-rate{background:rgba(255,255,255,0.05);color:var(--text-muted)}
        .badge-caught-sm{background:rgba(74,222,128,0.2);color:var(--accent);font-size:0.6rem;padding:2px 7px;border-radius:20px;font-weight:700;flex-shrink:0}
        .btn-row{display:flex;gap:6px;flex-wrap:wrap;padding:6px 16px 10px}
        .btn{padding:6px 13px;border-radius:50px;font-size:0.7rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);transition:0.2s}
        .btn:hover{background:rgba(255,255,255,0.05)}
        .btn-catch-all{border-color:var(--accent);color:var(--accent)}
        .btn-reset{border-color:var(--danger);color:var(--danger)}
        .btn-export{border-color:var(--accent2);color:var(--accent2)}
        .btn-import{border-color:var(--warning);color:var(--warning)}
        .toast{position:fixed;bottom:25px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--surface2);border:1px solid var(--accent);padding:10px 22px;border-radius:50px;font-weight:600;font-size:0.82rem;z-index:100;transition:0.3s;box-shadow:0 6px 24px rgba(0,0,0,0.5)}
        .toast.show{transform:translateX(-50%) translateY(0)}
        .footer{text-align:center;padding:16px;color:var(--text-muted);font-size:0.68rem}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:50;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none}
        .modal-overlay.active{opacity:1;pointer-events:auto}
        .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;max-width:480px;width:90%}
        .modal h3{margin-bottom:10px}
        .modal textarea{width:100%;height:120px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:10px;font-family:monospace;font-size:0.75rem;resize:vertical}

    </style>
</head>

    <div class="tab-bar"><button class="tab-btn active" id="tabAreasBtn" onclick="switchTab('areas')">🗺️ Areas</button><button class="tab-btn" id="tabPokedexBtn" onclick="switchTab('pokedex')">📖 Pokédex (A‑Z)</button></div>
    <div id="areasContainer"></div>
    <div id="pokedexContainer" style="display:none;"></div>
    <div class="footer"><p>Auto-saves to browser. Last saved: <span id="lastSaved">—</span></p></div>
</div>
<div class="toast" id="toast"></div>

// Build structured data
const areasMap = new Map();
rawExcelRows.forEach(row => {
  const [pokemon, location, moreInfo, method, level, rate] = row;
  if (!['Wild','Fish','Surf','Dive'].includes(method)) return;
  const fullLocation = location + (moreInfo ? ` (${moreInfo})` : '');
  if (!areasMap.has(fullLocation)) {
    areasMap.set(fullLocation, { title: fullLocation, icon: '📍', subsections: {} });
  }
  const area = areasMap.get(fullLocation);
  const subKey = method === 'Fish' ? 'Fishing' : method === 'Surf' ? 'Surfing' : method === 'Dive' ? 'Diving' : 'Land (Day/Night)';
  if (!area.subsections[subKey]) area.subsections[subKey] = [];
  // Format level
  let levelStr = level ? `Lv.${level.replace(/\s*\-\s*/g,'‑')}` : '';
  area.subsections[subKey].push({
    name: pokemon,
    rate: `${levelStr ? levelStr + ', ' : ''}${rate}`
  });
});

// Convert map to array
const areasData = Array.from(areasMap.values()).map(area => {
  const subsections = Object.entries(area.subsections).map(([label, pokemon]) => ({
    label,
    pokemon: pokemon.sort((a,b) => a.name.localeCompare(b.name))
  }));
  return { id: area.title.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''), title: area.title, icon: '📍', subsections };
});

// ═══════════════════════════════════════════
// STATE & LOGIC (same as before)
// ═══════════════════════════════════════════
const STORAGE_KEY = 'pkmn_lazarus_full_caught';
let caughtSet = new Set();
let currentTab = 'areas';

function normalize(name) { return name.trim().toLowerCase().replace(/\s+/g, ' '); }
function loadState() { try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) { const arr = JSON.parse(raw); if (Array.isArray(arr)) caughtSet = new Set(arr.map(normalize)); } } catch(e) { caughtSet = new Set(); } }
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(Array.from(caughtSet))); document.getElementById('lastSaved').textContent = new Date().toLocaleTimeString(); }
function isCaught(name) { return caughtSet.has(normalize(name)); }
function toggleCaught(name) { const key = normalize(name); if (caughtSet.has(key)) caughtSet.delete(key); else caughtSet.add(key); saveState(); refreshAllUI(); }
function setCaught(name, value) { const key = normalize(name); if (value) caughtSet.add(key); else caughtSet.delete(key); }

function buildAreas() {
  const container = document.getElementById('areasContainer');
  container.innerHTML = '';
  areasData.forEach(area => {
    const card = document.createElement('div');
    card.className = 'area-card';
    card.id = 'area-' + area.id;
    card.dataset.areaId = area.id;
    const allPoke = area.subsections.flatMap(s => s.pokemon);
    const uniquePoke = [...new Set(allPoke.map(p => normalize(p.name)))];
    const caughtCount = uniquePoke.filter(n => caughtSet.has(n)).length;
    const totalCount = uniquePoke.length;
    const pct = totalCount ? Math.round((caughtCount/totalCount)*100) : 0;
    card.innerHTML = `
      <div class="area-header" onclick="toggleCollapse('${area.id}')">
        <span class="area-title"><span class="area-icon">${area.icon}</span>${area.title}</span>
        <span class="area-meta"><span class="area-progress">${caughtCount}/${totalCount} · ${pct}%</span><span class="chevron">▼</span></span>
      </div>
      <div class="area-body">
        ${area.subsections.map(sub => `
          <div class="area-subsection">${sub.label}</div>
          ${sub.pokemon.map(p => {
            const caught = isCaught(p.name);
            return `<div class="poke-row${caught?' caught':''}" data-poke-name="${normalize(p.name)}" data-area-id="${area.id}" onclick="toggleCaught('${p.name.replace(/'/g, "\\'")}')">
              <div class="check-circle">✓</div>
              <div class="poke-info"><div class="poke-name">${p.name}</div></div>
              <span class="poke-badge badge-rate">${p.rate}</span>
              ${caught?'<span class="badge-caught-sm">Caught</span>':''}
            </div>`;
          }).join('')}
        `).join('')}
        <div class="btn-row">
          <button class="btn btn-catch-all" onclick="event.stopPropagation();markAllInArea('${area.id}',true)">✅ Mark All</button>
          <button class="btn btn-reset" onclick="event.stopPropagation();markAllInArea('${area.id}',false)">↩ Clear</button>
        </div>
      </div>`;
    container.appendChild(card);
  });
  document.querySelectorAll('.area-card').forEach(card => {
    const saved = localStorage.getItem('collapse_'+card.dataset.areaId);
    if (saved==='true') card.classList.add('collapsed');
  });
}

function buildPokedex() {
  const container = document.getElementById('pokedexContainer');
  const allPoke = new Map();
  areasData.forEach(area => area.subsections.forEach(sub => sub.pokemon.forEach(p => {
    const key = normalize(p.name);
    if (!allPoke.has(key)) allPoke.set(key, { name: p.name, locations: [] });
    const entry = allPoke.get(key);
    if (!entry.locations.find(l => l.id === area.id)) entry.locations.push({ id: area.id, title: area.title });
  })));
  const sorted = [...allPoke.keys()].sort((a,b) => a.localeCompare(b));
  container.innerHTML = '';
  sorted.forEach(key => {
    const entry = allPoke.get(key);
    const caught = caughtSet.has(key);
    const div = document.createElement('div');
    div.className = 'pokedex-row' + (caught?' caught':'');
    div.dataset.pokeName = key;
    div.onclick = () => toggleCaught(entry.name);
    div.innerHTML = `<div class="check-circle">✓</div><div class="poke-info"><div class="poke-name">${entry.name}</div><div style="font-size:0.65rem;color:var(--text-muted)">${entry.locations.map(l=>l.title).join(', ')}</div></div>${caught?'<span class="badge-caught-sm">Caught</span>':''}`;
    container.appendChild(div);
  });
}

function refreshAllUI() {
  document.querySelectorAll('.poke-row').forEach(row => {
    const caught = caughtSet.has(row.dataset.pokeName);
    row.classList.toggle('caught', caught);
    const badge = row.querySelector('.badge-caught-sm');
    if (caught && !badge) { const b = document.createElement('span'); b.className = 'badge-caught-sm'; b.textContent = 'Caught'; row.appendChild(b); }
    else if (!caught && badge) badge.remove();
  });
  document.querySelectorAll('.area-card').forEach(card => {
    const area = areasData.find(a => a.id === card.dataset.areaId);
    if (!area) return;
    const unique = [...new Set(area.subsections.flatMap(s => s.pokemon).map(p => normalize(p.name)))];
    const caughtCount = unique.filter(n => caughtSet.has(n)).length;
    const total = unique.length;
    const pct = total ? Math.round((caughtCount/total)*100) : 0;
    const el = card.querySelector('.area-progress');
    if (el) el.textContent = `${caughtCount}/${total} · ${pct}%`;
  });
  if (currentTab === 'pokedex') {
    document.querySelectorAll('.pokedex-row').forEach(row => {
      const caught = caughtSet.has(row.dataset.pokeName);
      row.classList.toggle('caught', caught);
      const badge = row.querySelector('.badge-caught-sm');
      if (caught && !badge) { const b = document.createElement('span'); b.className = 'badge-caught-sm'; b.textContent = 'Caught'; row.appendChild(b); }
      else if (!caught && badge) badge.remove();
    });
  }
  updateStats();
}

function updateStats() {
  const allUnique = new Set();
  areasData.forEach(a => a.subsections.forEach(s => s.pokemon.forEach(p => allUnique.add(normalize(p.name)))));
  const total = allUnique.size;
  let caught = 0;
  allUnique.forEach(n => { if (caughtSet.has(n)) caught++; });
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statCaught').textContent = caught;
  document.getElementById('statRemaining').textContent = total - caught;
  const pct = total ? Math.round((caught/total)*100) : 0;
  document.getElementById('progressPercent').textContent = pct + '%';
  document.getElementById('progressCircle').style.strokeDashoffset = 213.63 - (pct/100)*213.63;
}

window.toggleCollapse = function(id) {
  const card = document.getElementById('area-'+id);
  if (card) { card.classList.toggle('collapsed'); localStorage.setItem('collapse_'+id, card.classList.contains('collapsed')); }
};
window.markAllInArea = function(areaId, caught) {
  const area = areasData.find(a => a.id === areaId);
  if (!area) return;
  area.subsections.forEach(s => s.pokemon.forEach(p => setCaught(p.name, caught)));
  saveState();
  refreshAllUI();
  showToast(caught ? '✅ All marked caught!' : '↩ Area cleared.');
};

window.switchTab = function(tab) {
  currentTab = tab;
  document.getElementById('tabAreasBtn').classList.toggle('active', tab==='areas');
  document.getElementById('tabPokedexBtn').classList.toggle('active', tab==='pokedex');
  document.getElementById('areasContainer').style.display = tab==='areas' ? 'block' : 'none';
  document.getElementById('pokedexContainer').style.display = tab==='pokedex' ? 'block' : 'none';
  if (tab==='pokedex') buildPokedex();
};

// Search
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
const pokemonIndex = new Map();
const locationIndex = new Map();
areasData.forEach(area => {
  locationIndex.set(area.title.toLowerCase(), area.id);
  area.subsections.forEach(sub => sub.pokemon.forEach(p => {
    const key = normalize(p.name);
    if (!pokemonIndex.has(key)) pokemonIndex.set(key, { name: p.name, locations: [] });
    const entry = pokemonIndex.get(key);
    if (!entry.locations.find(l => l.id === area.id)) entry.locations.push({ id: area.id, title: area.title });
  }));
});

function updateSearch() {
  const q = searchInput.value.trim().toLowerCase();
  if (q.length < 2) { searchResults.classList.remove('active'); return; }
  const results = [];
  pokemonIndex.forEach((entry, key) => { if (key.includes(q) || entry.name.toLowerCase().includes(q)) results.push({type:'pokemon', entry}); });
  locationIndex.forEach((id, title) => { if (title.includes(q)) { const area = areasData.find(a => a.id === id); if (area) results.push({type:'location', area}); } });
  searchResults.innerHTML = results.length ? results.map(r => r.type==='pokemon' ? `<div class="search-result-item" onclick="scrollToPokemon('${normalize(r.entry.name)}','${r.entry.locations[0]?.id}')"><span class="result-name">${r.entry.name}</span><span class="result-meta">${r.entry.locations.map(l=>l.title).join(', ')}</span>${caughtSet.has(normalize(r.entry.name))?'<span class="badge-caught">✓</span>':''}</div>` : `<div class="search-result-item" onclick="scrollToArea('${r.area.id}')"><span class="result-name">📍 ${r.area.title}</span></div>`).join('') : '<div class="no-results">Nothing found.</div>';
  searchResults.classList.add('active');
}
searchInput.addEventListener('input', updateSearch);
searchInput.addEventListener('focus', () => { if (searchInput.value.trim().length >= 2) updateSearch(); });
document.addEventListener('click', e => { if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) searchResults.classList.remove('active'); });

window.scrollToPokemon = function(normName, areaId) {
  searchResults.classList.remove('active');
  if (currentTab !== 'areas') switchTab('areas');
  const card = document.getElementById('area-'+areaId);
  if (card) { card.classList.remove('collapsed'); localStorage.setItem('collapse_'+areaId, 'false'); card.scrollIntoView({behavior:'smooth',block:'center'}); }
};
window.scrollToArea = function(areaId) {
  searchResults.classList.remove('active');
  if (currentTab !== 'areas') switchTab('areas');
  const card = document.getElementById('area-'+areaId);
  if (card) { card.classList.remove('collapsed'); card.scrollIntoView({behavior:'smooth',block:'center'}); }
};

function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }

// Export/Import
window.exportData = function() {
  const data = { caught: Array.from(caughtSet), exported: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'lazarus-full-save.json'; a.click();
};
window.openImportModal = function() { document.getElementById('importModal').classList.add('active'); };
window.closeImportModal = function() { document.getElementById('importModal').classList.remove('active'); };
window.doImport = function() {
  const raw = document.getElementById('importTextarea').value;
  try {
    const data = JSON.parse(raw);
    if (data.caught && Array.isArray(data.caught)) {
      caughtSet = new Set(data.caught.map(normalize));
      saveState(); refreshAllUI(); closeImportModal(); showToast('📥 Imported!');
    }
  } catch(e) { alert('Invalid JSON'); }
};

// Init
function init() {
  loadState();
  buildAreas();
  buildPokedex();
  updateStats();
  document.getElementById('lastSaved').textContent = localStorage.getItem(STORAGE_KEY) ? new Date().toLocaleTimeString() : '—';
  const footer = document.querySelector('.footer');
  const div = document.createElement('div');
  div.style.cssText = 'margin-top:8px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap';
  div.innerHTML = `<button class="btn btn-export" onclick="exportData()">📤 Export</button><button class="btn btn-import" onclick="openImportModal()">📥 Import</button><button class="btn btn-reset" onclick="if(confirm('Clear all?')){caughtSet.clear();saveState();refreshAllUI();showToast('🗑️ Cleared');}">🗑️ Reset</button>`;
  footer.appendChild(div);
}
init();
})();
</script>
</body>
